<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      color: #58a6ff;
      letter-spacing: -0.5px;
    }

    header p {
      color: #8b949e;
      font-size: 0.95rem;
      margin-top: 6px;
    }

    .container {
      width: 100%;
      max-width: 620px;
    }

    /* ── Add-todo form ── */
    .add-form {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .add-form h2 {
      font-size: 1rem;
      color: #8b949e;
      font-weight: 600;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .form-row input, .form-row textarea, textarea.desc {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 0.95rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }

    .form-row input:focus, textarea.desc:focus {
      border-color: #58a6ff;
    }

    textarea.desc {
      width: 100%;
      resize: vertical;
      min-height: 60px;
      margin-bottom: 10px;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, background .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary  { background: #238636; color: #fff; }
    .btn-danger   { background: #da3633; color: #fff; }
    .btn-ghost    { background: transparent; border: 1px solid #30363d; color: #8b949e; }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid #30363d;
      background: transparent;
      color: #8b949e;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }

    .filter-btn.active {
      background: #58a6ff;
      color: #0d1117;
      border-color: #58a6ff;
    }

    /* ── Todo list ── */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .todo-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: border-color .15s;
    }

    .todo-card:hover { border-color: #58a6ff44; }

    .todo-card.completed { opacity: .55; }

    .todo-check {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border-radius: 50%;
      border: 2px solid #30363d;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      transition: background .15s, border-color .15s;
    }

    .todo-card.completed .todo-check {
      background: #238636;
      border-color: #238636;
    }

    .todo-check svg { display: none; }
    .todo-card.completed .todo-check svg { display: block; }

    .todo-body { flex: 1; min-width: 0; }

    .todo-title {
      font-size: 1rem;
      font-weight: 600;
      color: #e6edf3;
      word-break: break-word;
    }

    .todo-card.completed .todo-title {
      text-decoration: line-through;
      color: #8b949e;
    }

    .todo-desc {
      font-size: 0.875rem;
      color: #8b949e;
      margin-top: 4px;
      word-break: break-word;
      line-height: 1.5;
    }

    .todo-meta {
      font-size: 0.75rem;
      color: #484f58;
      margin-top: 6px;
    }

    .todo-delete {
      background: transparent;
      border: none;
      color: #484f58;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }

    .todo-delete:hover { color: #da3633; background: #da363322; }

    /* ── Empty / loading states ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #484f58;
      font-size: 1rem;
    }

    .empty .icon { font-size: 3rem; margin-bottom: 12px; }

    /* ── Toast notifications ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.9rem;
      color: #e6edf3;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
      transform: translateY(120%);
      transition: transform .25s ease;
      z-index: 999;
      max-width: 300px;
    }

    #toast.show { transform: translateY(0); }
    #toast.success { border-color: #238636; color: #3fb950; }
    #toast.error   { border-color: #da3633; color: #f85149; }

    /* ── Stats bar ── */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #8b949e;
    }

    .stats span { font-weight: 700; color: #58a6ff; }
  </style>
</head>
<body>

  <header>
    <h1>📝 My Todos</h1>
    <p>Backed by RDS PostgreSQL · Built with FastAPI</p>
  </header>

  <div class="container">

    <!-- Add form -->
    <div class="add-form">
      <h2>New Todo</h2>
      <div class="form-row">
        <input id="inp-title" type="text" placeholder="What needs to be done?" maxlength="255" />
      </div>
      <textarea id="inp-desc" class="desc" placeholder="Description (optional)"></textarea>
      <div class="form-row">
        <button class="btn btn-primary" onclick="addTodo()">＋ Add Todo</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats" id="stats"></div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all"       onclick="setFilter('all',this)">All</button>
      <button class="filter-btn"        data-filter="active"    onclick="setFilter('active',this)">Active</button>
      <button class="filter-btn"        data-filter="completed" onclick="setFilter('completed',this)">Completed</button>
    </div>

    <!-- List -->
    <div class="todo-list" id="todo-list">
      <div class="empty"><div class="icon">⏳</div>Loading…</div>
    </div>

  </div>

  <div id="toast"></div>

  <script>
    const API = '/api/todos';
    let currentFilter = 'all';
    let allTodos = [];

    /* ── Utility ── */
    function fmt(iso) {
      return new Date(iso).toLocaleString(undefined, {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `show ${type}`;
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.className = '', 3000);
    }

    /* ── Render ── */
    function getVisible() {
      if (currentFilter === 'active')    return allTodos.filter(t => !t.completed);
      if (currentFilter === 'completed') return allTodos.filter(t =>  t.completed);
      return allTodos;
    }

    function render() {
      const list = document.getElementById('todo-list');
      const visible = getVisible();

      // Stats
      const total     = allTodos.length;
      const completed = allTodos.filter(t => t.completed).length;
      document.getElementById('stats').innerHTML =
        `<span>${total}</span> total &nbsp;·&nbsp; <span>${completed}</span> done &nbsp;·&nbsp; <span>${total - completed}</span> remaining`;

      if (!visible.length) {
        list.innerHTML = `<div class="empty"><div class="icon">🎉</div>${
          currentFilter === 'completed' ? 'No completed todos yet.' :
          currentFilter === 'active'    ? 'Nothing left to do!' :
          'No todos yet — add one above!'
        }</div>`;
        return;
      }

      list.innerHTML = visible.map(t => `
        <div class="todo-card ${t.completed ? 'completed' : ''}" id="card-${t.id}">
          <button class="todo-check" title="Toggle complete" onclick="toggle(${t.id}, ${t.completed})">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="todo-body">
            <div class="todo-title">${esc(t.title)}</div>
            ${t.description ? `<div class="todo-desc">${esc(t.description)}</div>` : ''}
            <div class="todo-meta">Created ${fmt(t.created_at)}</div>
          </div>
          <button class="todo-delete" title="Delete" onclick="remove(${t.id})">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6"/><path d="M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
          </button>
        </div>
      `).join('');
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* ── API calls ── */
    async function load() {
      try {
        const res = await fetch(API + '/');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        allTodos = await res.json();
        render();
      } catch(e) {
        document.getElementById('todo-list').innerHTML =
          `<div class="empty"><div class="icon">❌</div>Could not load todos.<br><small>${e.message}</small></div>`;
      }
    }

    async function addTodo() {
      const title = document.getElementById('inp-title').value.trim();
      const desc  = document.getElementById('inp-desc').value.trim();
      if (!title) { toast('Title is required.', 'error'); return; }

      try {
        const res = await fetch(API + '/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description: desc || null, completed: false }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const todo = await res.json();
        allTodos.unshift(todo);
        document.getElementById('inp-title').value = '';
        document.getElementById('inp-desc').value  = '';
        render();
        toast('Todo added!');
      } catch(e) {
        toast('Failed to add todo: ' + e.message, 'error');
      }
    }

    async function toggle(id, wasCompleted) {
      try {
        const res = await fetch(`${API}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ completed: !wasCompleted }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const updated = await res.json();
        allTodos = allTodos.map(t => t.id === id ? updated : t);
        render();
        toast(updated.completed ? 'Marked as done ✓' : 'Marked as active');
      } catch(e) {
        toast('Failed to update: ' + e.message, 'error');
      }
    }

    async function remove(id) {
      try {
        const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        allTodos = allTodos.filter(t => t.id !== id);
        render();
        toast('Todo deleted.');
      } catch(e) {
        toast('Failed to delete: ' + e.message, 'error');
      }
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    /* Enter key shortcut */
    document.getElementById('inp-title').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    /* Boot */
    load();
  </script>

</body>
</html>
