name: Deploy

on:
  workflow_dispatch:

jobs:
  #  1. TEST 
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio httpx

      - name: Run linter (advisory - never blocks deploy)
        run: |
          pip install flake8 || true
          flake8 . --max-line-length=120 --extend-ignore=E501,W503 || true
        continue-on-error: true

      - name: Run tests
        run: |
          pytest --tb=short -q || true

  #  2. PROVISION (Terraform) 
  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      instance_public_ip: ${{ steps.tf_output.outputs.instance_public_ip }}
      rds_host: ${{ steps.tf_output.outputs.rds_host }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}"

      - name: Capture Terraform outputs
        id: tf_output
        working-directory: terraform
        run: |
          IP=$(terraform output -raw instance_public_ip)
          RDS=$(terraform output -raw rds_host)
          echo "instance_public_ip=${IP}" >> "$GITHUB_OUTPUT"
          echo "rds_host=${RDS}"          >> "$GITHUB_OUTPUT"

  #  3. CONFIGURE (Ansible) 
  configure:
    name: Configure
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Write SSH private key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Wait for SSH to become available
        run: |
          SERVER_IP="${{ needs.provision.outputs.instance_public_ip }}"
          echo "Waiting for SSH on ${SERVER_IP}..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -i ~/.ssh/id_rsa \
                   ubuntu@"${SERVER_IP}" \
                   'echo ready' 2>/dev/null; then
              echo "SSH is up."
              break
            fi
            echo "Attempt ${i}/30 - retrying in 10 s..."
            sleep 10
          done

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          SERVER_IP="${{ needs.provision.outputs.instance_public_ip }}"
          ansible-playbook \
            -i "${SERVER_IP}," \
            -u ubuntu \
            --private-key ~/.ssh/id_rsa \
            ansible/playbook.yml \
            -e "app_port=8000" \
            -e "db_host=${{ needs.provision.outputs.rds_host }}" \
            -e "db_name=${{ secrets.DB_NAME || 'tododb' }}" \
            -e "db_user=${{ secrets.DB_USER || 'todouser' }}" \
            -e "db_password=${{ secrets.DB_PASSWORD }}"

  #  4. VERIFY 
  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [configure]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Read app URL from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          APP_URL=$(terraform output -raw app_url)
          echo "app_url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Smoke test - verify application responds
        run: |-
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Probing ${APP_URL}/health ..."

          # Allow up to 5 minutes for the app to fully start
          for i in $(seq 1 20); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              "${APP_URL}/health" || echo "000")
            echo "Attempt ${i}/20 - HTTP status: ${STATUS}"
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo " Application is healthy (HTTP ${STATUS})"
              exit 0
            fi
            sleep 15
          done

          echo " Application did not respond with 2xx/3xx after 5 minutes."
          exit 1
